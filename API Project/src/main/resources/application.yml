spring:
  datasource:
    jdbc-url: jdbc:postgresql://localhost:5432/poemdb
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
     maximum-pool-size: 30

flyway:
   enabled: true
   locations: classpath:db/migration
   baseline-on-migrate: true
   baseline-version: 1
   repair: true

